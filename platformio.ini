[env:waveshare_dash]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
build_src_filter = +<*> -<remote/> -<receiver/> -<mac_finder/> -<simulation/> -<remote_test/> -<uart_test/>
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I include
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
monitor_speed = 115200
lib_deps =
    lvgl/lvgl@^8.3.0
    makuna/NeoPixelBus @ ^2.8.0

[env:native_dash]
platform = native
build_src_filter = +<*> -<remote/> -<receiver/> -<mac_finder/>
build_flags =
    -std=c++11
    -I include
    -I .pio/libdeps/native
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D USE_SDL=1
    -I sdl2/include
    -lmingw32
    -lSDL2main
    -lSDL2
lib_deps =
    lvgl/lvgl@^8.3.0
    lvgl/lv_drivers@^8.3.0

[env:lilygo_remote]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
build_src_filter = +<remote/>
build_flags =
    -I include
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D INIT_SEQUENCE_3=1
    -D CGRAM_OFFSET=1
    -D TFT_RGB_ORDER=TFT_RGB
    -D TFT_INVERSION_ON=1
    -D TFT_PARALLEL_8_BIT=1
    -D TFT_WIDTH=170
    -D TFT_HEIGHT=320
    -D TFT_CS=6
    -D TFT_DC=7
    -D TFT_RST=5
    -D TFT_WR=8
    -D TFT_RD=9
    -D TFT_D0=39
    -D TFT_D1=40
    -D TFT_D2=41
    -D TFT_D3=42
    -D TFT_D4=45
    -D TFT_D5=46
    -D TFT_D6=47
    -D TFT_D7=48
    -D TFT_BL=38
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SMOOTH_FONT=1
monitor_speed = 115200
lib_deps =
    lvgl/lvgl@^8.3.0
    bodmer/TFT_eSPI@^2.5.31

[env:native_remote]
platform = native
build_src_filter = +<remote/>
build_flags =
    -std=c++11
    -I include
    -I .pio/libdeps/native
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D USE_SDL=1
    -I sdl2/include
    -lmingw32
    -lSDL2main
    -lSDL2
lib_deps =
    lvgl/lvgl@^8.3.0
    lvgl/lv_drivers@^8.3.0

[env:receiver_d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
build_src_filter = +<receiver/>
monitor_speed = 115200

[env:native_full_stack]
platform = native
build_src_filter = +<*> -<main.cpp> -<remote/main.cpp> -<receiver/main.cpp> -<mac_finder/> -<remote_test/> -<uart_test/>
build_flags =
    -std=c++11
    -I include
    -I .pio/libdeps/native
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -D USE_SDL=1
    -I sdl2/include
    -lmingw32
    -lSDL2main
    -lSDL2
    -D NATIVE_FULL_STACK
    -D LV_COLOR_16_SWAP=0
lib_deps =
    lvgl/lvgl@^8.3.0
    lvgl/lv_drivers@^8.3.0

; ==========================================================
; DEBUG ENVIRONMENTS
; ==========================================================

[env:waveshare_dash_debug]
extends = env:waveshare_dash
build_flags = 
    ${env:waveshare_dash.build_flags}
    -D DEBUG_ESPNOW

[env:lilygo_remote_debug]
extends = env:lilygo_remote
build_flags = 
    ${env:lilygo_remote.build_flags}
    -D DEBUG_ESPNOW

[env:receiver_d1_mini_debug]
extends = env:receiver_d1_mini
build_flags = 
    ${env:receiver_d1_mini.build_flags}
    -D DEBUG_ESPNOW
    -D RECEIVER_DEBUG_MODE


[env:mac_finder_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_src_filter = +<mac_finder/>
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:mac_finder_8266]
platform = espressif8266
board = d1_mini
framework = arduino
build_src_filter = +<mac_finder/>
monitor_speed = 115200

[env:remote_test]
extends = env:lilygo_remote
build_src_filter = +<remote_test/>
build_flags = 
    ${env:lilygo_remote.build_flags}
    -D REMOTE_TEST_ENV

[env:uart_test]
platform = espressif8266
board = d1_mini
framework = arduino
build_src_filter = +<uart_test/>
monitor_speed = 115200
